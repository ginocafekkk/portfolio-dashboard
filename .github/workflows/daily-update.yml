name: 📊 每日持仓更新

on:
  schedule:
    # 周一到周五 18:00 UTC = 次日凌晨 2:00 CST（美股收盘后）
    - cron: '0 18 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Fetch prices & update data
        run: python scripts/fetch-prices.py
      
      - name: Commit & push
        run: |
          git config user.name "Labuster Bot"
          git config user.email "bot@labuster.portfolio"
          git add data/portfolio.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📊 自动更新持仓数据 $(date +'%Y-%m-%d')" && git push)