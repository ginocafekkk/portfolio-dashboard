name: 📊 每日持仓更新

on:
  schedule:
    # A股/港股收盘后 ~16:30 CST = 08:30 UTC
    - cron: '30 8 * * 1-5'
    # 美股收盘后 ~17:00 ET (夏令时21:00 UTC, 冬令时22:00 UTC)
    - cron: '0 21 * * 1-5'   # EDT (3月~11月初)
    - cron: '0 22 * * 1-5'   # EST (11月~3月初)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Fetch prices
        run: python scripts/fetch-prices.py
      - name: Commit & push
        run: |
          git config user.name "Labuster Bot"
          git config user.email "bot@labuster.portfolio"
          git add data/portfolio.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "📊 自动更新 $(date +'%Y-%m-%d %H:%M')" && git push)
