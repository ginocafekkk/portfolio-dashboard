<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>木木的咖啡地图 ☕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5efe0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 12px;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.map-card {
  max-width: 480px;
  width: 100%;
  background: #fffbf0;
  border-radius: 28px;
  border: 4px solid #2b1810;
  box-shadow: 8px 8px 0 rgba(43,24,16,0.2);
  overflow: hidden;
  padding: 16px;
}
.map-title {
  text-align: center;
  padding-bottom: 12px;
  border-bottom: 3px dashed #e8b87a;
  margin-bottom: 12px;
}
.map-title h1 {
  font-size: 24px;
  font-weight: 900;
  color: #2b1810;
  letter-spacing: 1px;
}
.map-title h1 span { color: #b8451e; }
.map-title .sub {
  font-size: 11px;
  color: #8b7355;
  margin-top: 2px;
}

.map-canvas-wrap {
  position: relative;
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: #f5efe0;
  border: 3px solid #d4a574;
}
canvas {
  display: block;
  width: 100%;
  height: auto;
}

.legend {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.legend-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 6px 8px;
  background: #faf6ee;
  border-radius: 10px;
  border: 1.5px solid #e8dcc8;
  font-size: 11px;
  line-height: 1.4;
}
.legend-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  border-radius: 50%;
  color: #fff;
  font-size: 9px;
  font-weight: 900;
  flex-shrink: 0;
  margin-top: 1px;
  border: 2px solid #fff;
}
.legend-name {
  font-weight: 700;
  color: #2b1810;
}
.legend-addr {
  font-size: 10px;
  color: #8b7355;
}

@media (max-width: 400px) {
  .legend { grid-template-columns: 1fr; }
  .map-card { padding: 10px; }
  .map-title h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="map-card">
  <div class="map-title">
    <h1>☕ <span>木木的</span>咖啡地图</h1>
    <div class="sub">上海 · 收录 8 家咖啡店</div>
  </div>
  <div class="map-canvas-wrap">
    <canvas id="C" width="440" height="560"></canvas>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script>
const shops = [
  { id:1, n:'T12 Lab', a:'乌鲁木齐南路288号', x:0.16, y:0.50, c:'#6B4226' },
  { id:2, n:'乔治队长', a:'太原路236号', x:0.30, y:0.44, c:'#8B4513' },
  { id:3, n:'铁手咖啡', a:'南昌路234号', x:0.72, y:0.25, c:'#556B2F' },
  { id:4, n:'D.ORINO', a:'康定路833号', x:0.60, y:0.08, c:'#4A6741' },
  { id:5, n:'潜行深作', a:'太原路315号-2', x:0.34, y:0.68, c:'#6B3A5A' },
  { id:6, n:'三又二分之一', a:'太原路305弄1号', x:0.32, y:0.60, c:'#B8860B' },
  { id:7, n:'Tequila Espresso', a:'嘉善路55号', x:0.48, y:0.38, c:'#C0392B' },
  { id:8, n:'Spot Table', a:'陕西北路457号', x:0.62, y:0.14, c:'#CD5C5C' },
];

const c = document.getElementById('C'), cx = c.getContext('2d');
const W = 440, H = 560;

function draw() {
  // --- Paper BG ---
  cx.fillStyle = '#f5efe0';
  cx.fillRect(0, 0, W, H);

  // Subtle hand-drawn grid
  cx.strokeStyle = 'rgba(200,185,165,0.2)';
  cx.lineWidth = 0.8;
  for (let i = 0; i < W; i += 20) { cx.beginPath(); cx.moveTo(i,0); cx.lineTo(i,H); cx.stroke(); }
  for (let i = 0; i < H; i += 20) { cx.beginPath(); cx.moveTo(0,i); cx.lineTo(W,i); cx.stroke(); }

  // --- Hand-drawn roads ---
  function road(pts, w) {
    // shadow
    cx.save();
    cx.strokeStyle = '#d5c9b5'; cx.lineWidth = w+4; cx.lineCap = 'round'; cx.lineJoin = 'round';
    cx.beginPath(); pts.forEach((p,i) => i===0 ? cx.moveTo(p[0],p[1]) : cx.lineTo(p[0],p[1])); cx.stroke();
    // road surface (hand-drawn warm color)
    cx.strokeStyle = '#f5ede0'; cx.lineWidth = w;
    cx.beginPath(); pts.forEach((p,i) => i===0 ? cx.moveTo(p[0],p[1]) : cx.lineTo(p[0],p[1])); cx.stroke();
    // center line (dashed, hand-drawn)
    cx.strokeStyle = 'rgba(180,160,140,0.3)'; cx.lineWidth = 1.5; cx.setLineDash([4,6]);
    cx.beginPath(); pts.forEach((p,i) => i===0 ? cx.moveTo(p[0],p[1]) : cx.lineTo(p[0],p[1])); cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }

  // Vertical roads
  road([[130,5],[130,545]], 14);  // 乌鲁木齐南路
  road([[225,5],[225,545]], 16); // 太原路
  road([[315,5],[315,545]], 14); // 嘉善路

  // Horizontal roads
  road([[5,55],[435,55]], 14);   // 康定路
  road([[5,155],[435,155]], 14); // 南昌路
  road([[5,355],[435,355]], 14); // 建国西路
  road([[5,475],[435,475]], 14); // 永嘉路

  // 陕西北路 (vertical, right)
  road([[370,5],[370,200]], 12);

  // --- Road name labels (handwritten style) ---
  function rn(x,y,t,rot) {
    cx.save();
    cx.translate(x,y);
    if (rot) cx.rotate(rot);
    cx.fillStyle = '#a09080';
    cx.font = 'bold 10px "PingFang SC", "Microsoft YaHei", sans-serif';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(t, 0, 0);
    cx.restore();
  }
  rn(130, 2, '乌鲁木齐南路', 0);
  rn(225, 2, '太原路', 0);
  rn(315, 2, '嘉善路', 0);
  rn(5, 48, '康定路', 0);
  rn(5, 148, '南昌路', 0);
  rn(5, 348, '建国西路', 0);
  rn(5, 468, '永嘉路', 0);
  rn(370, 2, '陕西北路', 0);

  // --- Green parks / trees ---
  function park(x,y,w,h) {
    cx.fillStyle = 'rgba(160,200,140,0.2)';
    cx.beginPath(); rr(x,y,w,h,8); cx.fill();
    // Small trees
    for (let i=0;i<2+Math.random()*2;i++) {
      let tx = x+8+Math.random()*(w-16), ty = y+8+Math.random()*(h-16);
      tree(tx,ty,3+Math.random()*3);
    }
  }
  function tree(x,y,s) {
    cx.fillStyle = '#8B7355'; cx.fillRect(x-1.5,y-3,3,6);
    for (let g of ['#7BA07B','#8FBC8F','#98D898']) {
      cx.fillStyle = g;
      cx.beginPath();
      let ox = g==='#8FBC8F'?-2:g==='#98D898'?2:0;
      let oy = g==='#7BA07B'?0:(g==='#8FBC8F'?-1.5:-0.5);
      cx.arc(x+ox, y-6+oy, s*(g==='#7BA07B'?1.1:g==='#8FBC8F'?0.8:0.6), 0, Math.PI*2);
      cx.fill();
    }
  }

  park(5, 70, 50, 40);
  park(370, 80, 65, 50);
  park(5, 390, 60, 40);
  park(300, 490, 60, 40);
  park(160, 370, 60, 50);

  // --- Clouds ---
  function cloud(x,y,s) {
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.beginPath();
    cx.arc(x,y,s*6,0,Math.PI*2);
    cx.arc(x+s*8,y-s*3,s*5,0,Math.PI*2);
    cx.arc(x+s*14,y,s*7,0,Math.PI*2);
    cx.fill();
  }
  cloud(340, 30, 1); cloud(70, 35, 0.8); cloud(50, 530, 0.6);

  // --- Highlight zone: 太原路咖啡街 ---
  cx.save();
  cx.fillStyle = 'rgba(192,57,43,0.06)';
  cx.strokeStyle = 'rgba(192,57,43,0.3)';
  cx.lineWidth = 2.5; cx.setLineDash([5,5]);
  rr(195, 230, 85, 255, 12);
  cx.fill(); cx.stroke();
  cx.setLineDash([]);

  // Banner tag
  cx.fillStyle = '#c0392b';
  rr(200, 225, 75, 18, 9); cx.fill();
  cx.fillStyle = '#fff';
  cx.font = 'bold 10px "PingFang SC", sans-serif';
  cx.textAlign = 'center';
  cx.fillText('☕ 太原路咖啡街', 237, 235);
  cx.restore();

  // --- Cute stickers ---
  cx.font = '20px sans-serif';
  cx.fillText('☕', 385, 495);
  cx.fillText('✨', 30, 40);
  cx.fillText('🏠', 370, 420);
  cx.fillText('🌸', 50, 510);

  // --- Draw pushpin markers ---
  shops.forEach(s => {
    let px = s.x * W, py = s.y * H;
    let sz = 20;

    // Glow
    let g = cx.createRadialGradient(px,py-4,0,px,py-4,28);
    g.addColorStop(0,'rgba(255,200,100,0.3)'); g.addColorStop(1,'rgba(255,200,100,0)');
    cx.fillStyle = g; cx.beginPath(); cx.arc(px,py-4,28,0,Math.PI*2); cx.fill();

    // Pin shadow
    cx.fillStyle = 'rgba(0,0,0,0.12)';
    cx.beginPath(); cx.ellipse(px+2,py+2,sz*0.55,sz*0.3,0,0,Math.PI*2); cx.fill();

    // Pin head (rotated square with rounded corners = diamond pin)
    cx.save();
    let pg = cx.createRadialGradient(px-2,py-7,1,px,py,sz);
    let lc = light(s.c,40), dc = dark(s.c,20);
    pg.addColorStop(0, lc); pg.addColorStop(0.5, s.c); pg.addColorStop(1, dc);
    cx.translate(px, py-4);
    cx.rotate(-0.45);
    // Rounded square
    let hw = sz * 0.7;
    cx.beginPath();
    cx.moveTo(-hw+4, -hw);
    cx.lineTo(hw-4, -hw);
    cx.quadraticCurveTo(hw, -hw, hw, -hw+4);
    cx.lineTo(hw, hw-4);
    cx.quadraticCurveTo(hw, hw, hw-4, hw);
    cx.lineTo(-hw+4, hw);
    cx.quadraticCurveTo(-hw, hw, -hw, hw-4);
    cx.lineTo(-hw, -hw+4);
    cx.quadraticCurveTo(-hw, -hw, -hw+4, -hw);
    cx.closePath();
    cx.fillStyle = pg; cx.fill();
    cx.strokeStyle = '#fff'; cx.lineWidth = 2.5; cx.stroke();
    cx.restore();

    // Number
    cx.fillStyle = '#fff';
    cx.font = `bold ${sz > 20 ? 12 : 10}px sans-serif`;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(s.id, px, py-5);

    // Label with shop name
    cx.save();
    let lines = s.n.split('\n');
    cx.font = 'bold 10px "PingFang SC", "Microsoft YaHei", sans-serif';
    let mw = Math.max(...lines.map(l => cx.measureText(l).width));
    let pw=8, ph=3, lw=mw+pw*2, lh=lines.length*14+ph*2;
    let lx = px - lw/2, ly = py - sz - 8 - lh;

    // Pointer triangle
    cx.fillStyle = '#fff'; cx.strokeStyle = '#2b1810'; cx.lineWidth = 1.2;
    cx.beginPath();
    cx.moveTo(px-4, py-sz-8); cx.lineTo(px, py-sz-8+5); cx.lineTo(px+4, py-sz-8);
    cx.closePath(); cx.fill(); cx.stroke();

    // Label bg
    cx.fillStyle = '#fff';
    rr(lx, ly, lw, lh, 6); cx.fill();
    cx.strokeStyle = '#2b1810'; cx.lineWidth = 1.2;
    rr(lx, ly, lw, lh, 6); cx.stroke();

    // Text
    cx.fillStyle = s.c; cx.font = 'bold 10px "PingFang SC", "Microsoft YaHei", sans-serif';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    lines.forEach((l, i) => cx.fillText(l, lx+lw/2, ly+ph+i*14+7));
    cx.restore();
  });

  // --- Build legend ---
  buildLegend();
}

function rr(x,y,w,h,r) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

function light(h,a) { let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`; }
function dark(h,a) { let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`; }

function buildLegend() {
  const el = document.getElementById('legend');
  shops.forEach(s => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <span class="legend-dot" style="background:${s.c}">${s.id}</span>
      <div>
        <div class="legend-name">${s.n}</div>
        <div class="legend-addr">📍 ${s.a}</div>
      </div>
    `;
    el.appendChild(item);
  });
}

draw();
</script>
</body>
</html>
